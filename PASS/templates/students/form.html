{% extends "base.html" %}
{% block title %}{{ student and 'Edit' or 'Add' }} Student{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="gradient-text mb-4">{{ student and 'Edit' or 'Add' }} Student</h2>
  <form method="post" class="needs-validation" novalidate>
    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">First Name</label>
        <input name="first_name" class="form-control" required value="{{ student.first_name if student else '' }}">
      </div>
      <div class="col-md-6">
        <label class="form-label">Last Name</label>
        <input name="last_name" class="form-control" required value="{{ student.last_name if student else '' }}">
      </div>
    </div>
    <div class="row mb-3">
      <div class="col-md-4">
        <label class="form-label">Date of Birth</label>
        <input type="date" name="dob" class="form-control" required value="{{ student.dob|default('') }}">
      </div>
      <div class="col-md-4">
        <label class="form-label">Gender</label>
        <select name="gender" class="form-select">
          <option value="" {% if not student %}selected{% endif %}>Select…</option>
          <option value="Male" {% if student and student.gender=='Male' %}selected{% endif %}>Male</option>
          <option value="Female" {% if student and student.gender=='Female' %}selected{% endif %}>Female</option>
          <option value="Other" {% if student and student.gender=='Other' %}selected{% endif %}>Other</option>
        </select>
      </div>
    </div>
    <h5 class="mt-4 mb-3">Contact Info</h5>
    <div class="row mb-3">
      <div class="col-md-4"><label class="form-label">Email</label><input name="email" class="form-control" value="{{ student.contact.email if student and student.contact else '' }}"></div>
      <div class="col-md-4"><label class="form-label">Phone</label><input name="phone" class="form-control" value="{{ student.contact.phone if student and student.contact else '' }}"></div>
      <div class="col-md-4"><label class="form-label">Address</label><input name="address" class="form-control" value="{{ student.contact.address if student and student.contact else '' }}"></div>
    </div>
    <button type="submit" class="btn btn-accent-2 btn-magnetic">Save</button>
  </form>
</div>
{% endblock %}
