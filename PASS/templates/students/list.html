{% extends "base.html" %}
{% block title %}Students{% endblock %}

{% block content %}
<div class="container py-4">
  <h2 class="gradient-text mb-4">Students</h2>
  <form method="get" class="mb-3">
    <div class="input-group w-50">
      <input type="text" name="q" class="form-control" placeholder="Search by name" value="{{ query }}">
      <button class="btn btn-primary" type="submit"><i class="bi bi-search"></i></button>
    </div>
  </form>
  <a href="{{ url_for('student.create_student') }}" class="btn btn-accent-2 mb-3 btn-magnetic">Add New Student</a>
  <table class="table table-dark table-hover">
    <thead><tr><th>#</th><th>Name</th><th>DOB</th><th>Actions</th></tr></thead>
    <tbody>
    {% for s in students %}
      <tr>
        <td>{{ loop.index }}</td>
        <td>{{ s.first_name }} {{ s.last_name }}</td>
        <td>{{ s.dob }}</td>
        <td><a href="{{ url_for('student.view_student', stu_id=s.id) }}" class="btn btn-sm btn-outline-light">View</a></td>
      </tr>
    {% else %}
      <tr><td colspan="4" class="text-center">No students found.</td></tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
