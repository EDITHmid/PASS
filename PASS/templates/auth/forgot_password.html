{% extends "base.html" %}

{% block body %}
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&display=swap');
* { font-family: 'Inter', sans-serif; }
:root {
  --pass-dark: #06080f;
  --c-blue: #4f7cff;
  --c-violet: #a78bfa;
  --c-rose: #fb7185;
  --c-teal: #2dd4bf;
}

html, body { background: var(--pass-dark); color: #e5e7eb; }

@keyframes fadeUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
@keyframes aurora-1 { 0%,100%{transform:translate(0,0) rotate(0deg) scale(1)} 33%{transform:translate(60px,-40px) rotate(120deg) scale(1.1)} 66%{transform:translate(-40px,30px) rotate(240deg) scale(0.95)} }
@keyframes aurora-2 { 0%,100%{transform:translate(0,0) rotate(0deg) scale(1)} 33%{transform:translate(-50px,40px) rotate(-100deg) scale(0.9)} 66%{transform:translate(40px,-30px) rotate(-200deg) scale(1.1)} }
@keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
@keyframes letter-in { 0%{opacity:0;transform:translateY(40px)rotateX(-30deg);filter:blur(6px)} 100%{opacity:1;transform:translateY(0)rotateX(0);filter:blur(0)} }
@keyframes gradient-flow { 0%,100%{background-position:0% 50%} 50%{background-position:100% 50%} }
@keyframes envelope-float { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-12px) rotate(4deg)} }

.anim-fade   { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) both; }
.anim-fade-1 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.1s both; }
.anim-fade-2 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both; }
.anim-fade-3 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.3s both; }
.anim-fade-4 { animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.4s both; }

.hero-letter { display: inline-block; animation: letter-in 0.6s cubic-bezier(0.16,1,0.3,1) both; }
.serif-accent { font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400; }
.gradient-text {
  background: linear-gradient(135deg, #fbbf24 0%, #fb7185 35%, #a78bfa 70%, #4f7cff 100%);
  background-size: 200% 200%;
  animation: gradient-flow 8s ease infinite;
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.aurora {
  position: absolute; pointer-events: none; border-radius: 50%;
  filter: blur(110px); opacity: 0.4;
}
.aurora-1 { top: -10%; left: 30%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(167,139,250,0.55) 0%, transparent 70%); animation: aurora-1 22s ease-in-out infinite; }
.aurora-2 { top: 50%; right: -10%; width: 450px; height: 450px; background: radial-gradient(circle, rgba(251,113,133,0.45) 0%, transparent 70%); animation: aurora-2 26s ease-in-out infinite; }
.aurora-3 { bottom: -10%; left: 10%; width: 600px; height: 450px; background: radial-gradient(circle, rgba(45,212,191,0.35) 0%, transparent 70%); animation: aurora-1 30s ease-in-out infinite reverse; }

#cursorGlow {
  position:fixed; pointer-events:none; z-index:9998; width:600px; height:600px; border-radius:50%;
  background: radial-gradient(circle, rgba(79,124,255,0.06) 0%, transparent 60%);
  transform: translate(-50%,-50%);
}

.form-input {
  background: rgba(255,255,255,0.03) !important;
  border: 1px solid rgba(255,255,255,0.07) !important;
  color: #e5e7eb !important;
  border-radius: 12px !important;
  padding: 0.85rem 1rem 0.85rem 2.6rem !important;
  font-size: 0.95rem;
  transition: all 0.3s;
  width: 100%;
}
.form-input:focus {
  background: rgba(255,255,255,0.05) !important;
  border-color: rgba(79,124,255,0.4) !important;
  box-shadow: 0 0 0 4px rgba(79,124,255,0.08) !important;
  outline: none;
}
.form-input::placeholder { color: rgba(255,255,255,0.2); }
.input-icon {
  position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,0.25); font-size: 0.95rem; pointer-events: none;
}

.auth-card {
  background: rgba(15,20,32,0.7);
  backdrop-filter: blur(24px) saturate(1.4);
  -webkit-backdrop-filter: blur(24px) saturate(1.4);
  border: 1px solid rgba(255,255,255,0.05);
  border-radius: 20px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  overflow: hidden;
  position: relative;
  transform-style: preserve-3d;
}
.auth-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, #4f7cff 0%, #a78bfa 35%, #fb7185 70%, #fbbf24 100%);
  background-size: 200% 100%;
  animation: gradient-flow 6s ease infinite;
  z-index: 2;
}
.btn-shimmer { position: relative; overflow: hidden; }
.btn-shimmer::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
  background-size: 200% 100%; animation: shimmer 3.5s infinite; pointer-events: none;
}
.btn-magnetic { position: relative; display: inline-flex; align-items: center; justify-content: center; transition: transform 0.25s ease-out; }

.gradient-btn {
  background: linear-gradient(135deg, #4f7cff 0%, #a78bfa 50%, #fb7185 100%);
  background-size: 200% 200%;
  animation: gradient-flow 6s ease infinite;
  color: #fff;
  border: none;
  box-shadow: 0 8px 32px rgba(79,124,255,0.25), 0 0 0 1px rgba(255,255,255,0.08) inset;
}

.envelope-art {
  width: 80px; height: 80px; border-radius: 24px;
  background: linear-gradient(135deg, rgba(79,124,255,0.15), rgba(167,139,250,0.15));
  border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem; color: #a78bfa;
  margin: 0 auto 1.5rem;
  animation: envelope-float 4s ease-in-out infinite;
  box-shadow: 0 16px 40px rgba(79,124,255,0.15);
}
</style>

<div id="cursorGlow"></div>

<div class="min-vh-100 d-flex align-items-center position-relative overflow-hidden py-5" style="background:var(--pass-dark);">
  <div class="position-absolute top-0 start-0 w-100 h-100" style="pointer-events:none;">
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.012) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.012) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 40%,transparent 70%);-webkit-mask-image:radial-gradient(ellipse at center,black 40%,transparent 70%);"></div>
    <canvas id="particles" style="position:absolute;inset:0;"></canvas>
  </div>

  <div class="container position-relative" style="z-index:1;">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5 col-xl-4">

        <div class="text-center mb-4 anim-fade">
          <a href="{{ url_for('auth.index') }}" class="text-decoration-none">
            <h2 class="fw-bold d-flex align-items-center justify-content-center gap-2 mb-0" style="color:#fff;letter-spacing:0.5px;">
              <span class="logo-wrap-static">
                <div class="logo-glow"></div>
                <img src="{{ url_for('static', filename='logo.png') }}" alt="PASS" width="38" height="38" style="border-radius:10px;">
              </span>
              <span style="font-size:1.4rem;letter-spacing:-0.5px;">PASS</span>
            </h2>
          </a>
        </div>

        <div class="anim-fade-1" style="perspective:1000px;">
          <div class="auth-card" id="authCard">
            <div class="card-body p-4 p-lg-5">

              <div class="envelope-art anim-fade-2">
                <i class="bi bi-envelope-paper-heart-fill"></i>
              </div>

              <div class="text-center mb-4 anim-fade-2">
                <h3 class="fw-bold mb-2" style="color:#fff;font-size:1.7rem;letter-spacing:-0.8px;">
                  <span class="hero-letter text-white" style="animation-delay:0.05s">Forgot</span>
                  <span class="hero-letter text-white" style="animation-delay:0.12s">your</span>
                  <span class="hero-letter gradient-text" style="animation-delay:0.19s">password?</span>
                </h3>
                <p class="mb-0" style="color:rgba(255,255,255,0.35);font-size:0.9rem;">No worries &mdash; we'll send <span class="serif-accent" style="color:rgba(255,255,255,0.55);">reset instructions</span></p>
              </div>

              <form method="POST" class="anim-fade-3">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div class="mb-4 position-relative">
                  <i class="bi bi-envelope input-icon"></i>
                  <input type="email" class="form-control form-input" name="email"
                         placeholder="your@email.com" required autofocus>
                </div>

                <button type="submit" class="btn w-100 py-3 fw-semibold text-white border-0 gradient-btn btn-shimmer btn-magnetic"
                        style="border-radius:12px;font-size:0.95rem;">
                  Send reset link <i class="bi bi-arrow-right ms-1"></i>
                </button>
              </form>

              <div class="text-center mt-4 anim-fade-4">
                <a href="{{ url_for('auth.login') }}" class="btn-magnetic text-decoration-none" style="color:rgba(255,255,255,0.4);font-size:0.85rem;display:inline-flex;align-items:center;gap:0.3rem;transition:color 0.3s;" onmouseover="this.style.color='#fff'" onmouseout="this.style.color='rgba(255,255,255,0.4)'">
                  <i class="bi bi-arrow-left"></i> Back to sign in
                </a>
              </div>
            </div>
          </div>
        </div>

        <p class="text-center mt-4 anim-fade-4" style="color:rgba(255,255,255,0.2);font-size:0.78rem;line-height:1.5;">
          <i class="bi bi-shield-check me-1" style="color:#2dd4bf;"></i>
          Reset links expire after 30 minutes for security.
        </p>

      </div>
    </div>
  </div>
</div>

<script>
(function() {
  const canvas = document.getElementById('particles');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let particles = [], w, h;
  function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  class Particle {
    constructor() { this.reset(); }
    reset() {
      this.x = Math.random() * w; this.y = Math.random() * h;
      this.size = Math.random() * 1.5 + 0.3;
      this.speedX = (Math.random() - 0.5) * 0.25; this.speedY = (Math.random() - 0.5) * 0.25;
      this.opacity = Math.random() * 0.3 + 0.05;
    }
    update() { this.x += this.speedX; this.y += this.speedY; if (this.x < 0 || this.x > w) this.speedX *= -1; if (this.y < 0 || this.y > h) this.speedY *= -1; }
    draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(255,255,255,${this.opacity})`; ctx.fill(); }
  }
  function init() { resize(); particles = Array.from({ length: Math.min(Math.floor(w * h / 15000), 80) }, () => new Particle()); }
  function animate() { ctx.clearRect(0, 0, w, h); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
  init(); animate(); window.addEventListener('resize', init);
})();

const glow = document.getElementById('cursorGlow');
document.addEventListener('mousemove', e => { glow.style.left = e.clientX + 'px'; glow.style.top = e.clientY + 'px'; });

(function() {
  const card = document.getElementById('authCard');
  if (!card) return;
  card.addEventListener('mousemove', e => {
    const rect = card.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width - 0.5;
    const y = (e.clientY - rect.top) / rect.height - 0.5;
    card.style.transform = `rotateY(${x*5}deg) rotateX(${-y*5}deg) translateZ(10px)`;
    card.style.transition = 'transform 0.1s ease-out';
  });
  card.addEventListener('mouseleave', () => { card.style.transform = ''; card.style.transition = 'transform 0.6s cubic-bezier(0.16,1,0.3,1)'; });
})();

document.querySelectorAll('.btn-magnetic').forEach(btn => {
  btn.addEventListener('mousemove', e => {
    const rect = btn.getBoundingClientRect();
    btn.style.transform = `translate(${(e.clientX - rect.left - rect.width / 2) * 0.2}px, ${(e.clientY - rect.top - rect.height / 2) * 0.2}px)`;
  });
  btn.addEventListener('mouseleave', () => { btn.style.transform = ''; });
});
</script>
{% endblock %}
