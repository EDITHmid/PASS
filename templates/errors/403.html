{% extends "base.html" %}

{% block title %}403 — Access Denied{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="mb-3">
        <span class="display-1 fw-bold text-warning">403</span>
    </div>
    <h4 class="fw-bold">Access Denied</h4>
    <p class="text-muted mb-4">You don't have permission to access this page.</p>
    <a href="{{ url_for('auth.index') }}" class="btn btn-primary">
        <i class="bi bi-house me-2"></i>Back to Home
    </a>
</div>
{% endblock %}
