{% extends "base.html" %}

{% block title %}500 — Server Error{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="mb-3">
        <span class="display-1 fw-bold text-danger">500</span>
    </div>
    <h4 class="fw-bold">Internal Server Error</h4>

        <i class="bi bi-house me-2"></i>Back to Home
    </a>
</div>
{% endblock %}
