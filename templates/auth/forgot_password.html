{% extends "base.html" %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, #073b4c 0%, #118ab2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="text-white fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>PASS</h2>
                    <p class="text-white-50 small">Proactive Academic Support System</p>
                </div>
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-1">Forgot Password</h5>
                        <p class="text-muted small mb-4">Enter your registered email to receive a reset link</p>

                        <form method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0" name="email"
                                           placeholder="your@email.com" required autofocus>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                <i class="bi bi-send me-2"></i>Send Reset Link
                            </button>
                        </form>

                        <hr class="my-4">
                        <div class="text-center">
                            <a href="{{ url_for('auth.login') }}" class="text-decoration-none small">
                                <i class="bi bi-arrow-left me-1"></i>Back to Login
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
