{% extends "base.html" %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, #073b4c 0%, #118ab2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="text-white fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>PASS</h2>
                    <p class="text-white-50 small">Proactive Academic Support System</p>
                </div>
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-1">Welcome back</h5>
                        <p class="text-muted small mb-4">Sign in to your account</p>

                        <form method="POST" action="{{ url_for('auth.login') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control border-start-0" name="username"
                                           placeholder="Enter your username" required autofocus>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control border-start-0" name="password"
                                           placeholder="Enter your password" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div class="form-check">
                                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                    <label class="form-check-label small" for="remember">Remember me</label>
                                </div>
                                <a href="{{ url_for('auth.forgot_password') }}" class="small text-decoration-none">Forgot password?</a>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="text-muted small mb-2">Don't have an account?</p>
                            <a href="{{ url_for('auth.register') }}" class="btn btn-outline-primary btn-sm">
                                Create Account
                            </a>
                        </div>

                        <!-- Demo credentials -->
                        <div class="mt-4 p-3 bg-light rounded-3">
                            <p class="small fw-semibold mb-2"><i class="bi bi-info-circle me-1"></i>Demo Accounts</p>
                            <div class="small text-muted">
                                <div><strong>Instructor:</strong> instructor / password123</div>
                                <div><strong>Student:</strong> arjun / password123</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
