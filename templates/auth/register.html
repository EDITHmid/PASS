{% extends "base.html" %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, #073b4c 0%, #118ab2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="text-white fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>PASS</h2>
                    <p class="text-white-50 small">Proactive Academic Support System</p>
                </div>
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-1">Create Account</h5>
                        <p class="text-muted small mb-4">Register to access the platform</p>

                        <form method="POST" action="{{ url_for('auth.register') }}">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person-badge"></i></span>
                                    <input type="text" class="form-control border-start-0" name="full_name"
                                           placeholder="Enter your full name" required autofocus>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control border-start-0" name="username"
                                           placeholder="Choose a username" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope"></i></span>
                                    <input type="email" class="form-control border-start-0" name="email"
                                           placeholder="Enter your email" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label small fw-semibold">Password</label>
                                    <input type="password" class="form-control" name="password"
                                           placeholder="Minimum 8 characters" required minlength="8">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label small fw-semibold">Confirm</label>
                                    <input type="password" class="form-control" name="password_confirm"
                                           placeholder="Repeat password" required minlength="8">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Role</label>
                                <select class="form-select" name="role" required>
                                    <option value="student" selected>Student</option>
                                    <option value="parent">Parent / Guardian</option>
                                    <option value="instructor">Teacher</option>
                                </select>
                            </div>

                            <!-- Student-specific fields -->
                            <div id="studentFields">
                                <div class="mb-3">
                                    <label class="form-label small fw-semibold">Roll No</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-hash"></i></span>
                                        <input type="text" class="form-control border-start-0" name="student_id"
                                               placeholder="e.g. CS001">
                                    </div>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                <i class="bi bi-person-plus me-2"></i>Create Account
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-center">
                            <p class="text-muted small mb-2">Already have an account?</p>
                            <a href="{{ url_for('auth.login') }}" class="btn btn-outline-primary btn-sm">
                                Sign In
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const roleSelect = document.querySelector('select[name="role"]');
    const studentFields = document.getElementById('studentFields');

    roleSelect.addEventListener('change', function() {
        studentFields.style.display = this.value === 'student' ? 'block' : 'none';
    });
});
</script>
{% endblock %}
