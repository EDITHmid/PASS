{% extends "base.html" %}

{% block body %}
<div class="min-vh-100 d-flex align-items-center" style="background: linear-gradient(135deg, #073b4c 0%, #118ab2 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <h2 class="text-white fw-bold"><i class="bi bi-mortarboard-fill me-2"></i>PASS</h2>
                    <p class="text-white-50 small">Proactive Academic Support System</p>
                </div>
                <div class="card border-0 shadow-lg">
                    <div class="card-body p-4">
                        <h5 class="fw-bold mb-1">Reset Password</h5>
                        <p class="text-muted small mb-4">Choose a new password for your account</p>

                        <form method="POST">
                            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">New Password</label>
                                <input type="password" class="form-control" name="password"
                                       placeholder="Minimum 8 characters" required minlength="8">
                            </div>

                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Confirm Password</label>
                                <input type="password" class="form-control" name="password_confirm"
                                       placeholder="Repeat password" required minlength="8">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                <i class="bi bi-check-circle me-2"></i>Reset Password
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
