# render.yaml — Render Blueprint
# Deploy via: https://render.com/deploy

services:
  - type: web
    name: pass-academic-support
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.13.9"
      - key: FLASK_ENV
        value: production
