services:
  - type: web
    name: pass-academic-support
    runtime: python
    buildCommand: pip install -r PASS/requirements.txt
    startCommand: cd PASS && gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: FLASK_ENV
        value: production
      - key: SCHOOL_NAME
        value: "Your School Name"
      - key: SCHOOL_ADDRESS
        value: ""
